name: "Release: Build & Publish to npm"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  id-token: write

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Release must be triggered from the main branch, got ${{ github.ref }}"
          exit 1

  release:
    needs: check-branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Sync version.ts
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "export const version = \"$NEW_VERSION\";" > src/version.ts

      - name: Read new version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/version.ts
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create git tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Summary
        run: echo "### Published @eulerstream/nats-cloudflare@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
